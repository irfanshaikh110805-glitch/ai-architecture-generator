name: Deploy to Production

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/ai-arch-backend
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    
    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Extract metadata
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/ai-arch-frontend
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
    
    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    # Docker Compose Deployment (SSH to server)
    - name: Deploy to server via SSH
      if: github.ref == 'refs/heads/main'
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        port: ${{ secrets.DEPLOY_PORT || 22 }}
        script: |
          cd ${{ secrets.DEPLOY_PATH || '/opt/ai-architecture-generator' }}
          
          # Pull latest images
          docker pull ${{ secrets.DOCKER_USERNAME }}/ai-arch-backend:main
          docker pull ${{ secrets.DOCKER_USERNAME }}/ai-arch-frontend:main
          
          # Backup database
          docker-compose exec -T backend python -c "import shutil; shutil.copy('architecture_generator.db', 'architecture_generator.db.backup')" || true
          
          # Update docker-compose.yml if needed
          wget -O docker-compose.yml https://raw.githubusercontent.com/${{ github.repository }}/main/docker-compose.yml || true
          
          # Stop and remove old containers
          docker-compose down
          
          # Start new containers
          docker-compose up -d
          
          # Wait for services to be healthy
          sleep 10
          
          # Check health
          curl -f http://localhost:8000/health || exit 1
          curl -f http://localhost/health || exit 1
          
          # Clean up old images
          docker image prune -af --filter "until=24h"
          
          echo "Deployment completed successfully"
    
    # Kubernetes Deployment (alternative)
    # Uncomment if using Kubernetes instead of Docker Compose
    # - name: Deploy to Kubernetes
    #   if: github.ref == 'refs/heads/main'
    #   uses: azure/k8s-deploy@v4
    #   with:
    #     manifests: |
    #       k8s/deployment.yaml
    #       k8s/service.yaml
    #     images: |
    #       ${{ secrets.DOCKER_USERNAME }}/ai-arch-backend:${{ github.sha }}
    #       ${{ secrets.DOCKER_USERNAME }}/ai-arch-frontend:${{ github.sha }}
    #     kubectl-version: 'latest'
    
    - name: Notify deployment status
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Deployment to production ${{ job.status }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
