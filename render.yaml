services:
  # Backend Web Service
  - type: web
    name: ai-architecture-generator
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: GEMINI_API_KEY
        sync: true
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: true
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: ALLOWED_HOSTS
        value: "*"

  # Frontend Static Site
  - type: static
    name: ai-architecture-generator-frontend
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ai-architecture-generator.onrender.com
      - key: VITE_ENVIRONMENT
        value: production
