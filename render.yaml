services:
  # Frontend Static Site
  - type: static
    name: ai-architecture-generator-frontend
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    publishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ai-architecture-generator.onrender.com
      - key: VITE_ENVIRONMENT
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
